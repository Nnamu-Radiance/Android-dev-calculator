name: calculator
description: A functional mobile grade calculator with themes.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.4.0
  xml: ^6.3.0
  file_picker: ^10.3.10
  excel: ^2.1.0
  path_provider: ^2.1.2
  provider: ^6.0.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "../assets/gradedC_logo.png"

flutter:
  uses-material-design: true
